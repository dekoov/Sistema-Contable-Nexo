worker_processes auto;

events {
    worker_connections 1024;
}

http {
    upstream payara_backend {
        least_conn;
        server payara-nodo1:8080 max_fails=3 fail_timeout=10s;
        server payara-nodo2:8080 max_fails=3 fail_timeout=10s;
        server payara-nodo3:8080 max_fails=3 fail_timeout=10s;
    }

    server {
        listen 8080;
        location /nginx-health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        location / {
            proxy_pass http://payara_backend;
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
            proxy_next_upstream_tries 3;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
