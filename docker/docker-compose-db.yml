# docker-compose-db.yml
name: nexo-db-cluster

services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.0
    container_name: etcd
    hostname: etcd
    command: etcd --enable-v2=true
    environment:
      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
      ETCD_ADVERTISE_CLIENT_URLS: http://etcd:2379
    ports:
      - "2379:2379"
    networks:
      - patroni-net

  postgres1:
    image: ghcr.io/zalando/spilo-17:4.0-p2
    container_name: postgres1
    hostname: postgres1
    depends_on:
      - etcd
    ports:
      - "5433:5432"
      - "8008:8008"
    environment:
      SCOPE: nexo-cluster
      PGROOT: /home/postgres/pgdata
      PGDATA: /home/postgres/pgdata/pgroot/data
      PGPASSWORD_SUPERUSER: postgres
      ETCD_HOST: etcd:2379
      PATRONI_ETCD3_HOSTS: etcd:2379
      PATRONI_RESTAPI_LISTEN: 0.0.0.0:8008
      PATRONI_RESTAPI_CONNECT_ADDRESS: postgres1:8008
      PATRONI_NAME: postgres1
      PATRONI_REPLICATION_USERNAME: replicator
      PATRONI_REPLICATION_PASSWORD: replicator
      PATRONI_SUPERUSER_USERNAME: postgres
      PATRONI_SUPERUSER_PASSWORD: postgres
      PATRONI_POSTGRESQL_CONNECT_ADDRESS: postgres1:5432
    volumes:
      - pg1-data:/home/postgres/pgdata
    networks:
      - patroni-net

  postgres2:
    image: ghcr.io/zalando/spilo-17:4.0-p2
    container_name: postgres2
    hostname: postgres2
    depends_on:
      - etcd
    ports:
      - "5434:5432"
      - "8009:8008"
    environment:
      SCOPE: nexo-cluster
      PGROOT: /home/postgres/pgdata
      PGDATA: /home/postgres/pgdata/pgroot/data
      PGPASSWORD_SUPERUSER: postgres
      ETCD_HOST: etcd:2379
      PATRONI_ETCD3_HOSTS: etcd:2379
      PATRONI_RESTAPI_LISTEN: 0.0.0.0:8008
      PATRONI_RESTAPI_CONNECT_ADDRESS: postgres2:8008
      PATRONI_NAME: postgres2
      PATRONI_REPLICATION_USERNAME: replicator
      PATRONI_REPLICATION_PASSWORD: replicator
      PATRONI_SUPERUSER_USERNAME: postgres
      PATRONI_SUPERUSER_PASSWORD: postgres
      PATRONI_POSTGRESQL_CONNECT_ADDRESS: postgres2:5432
    volumes:
      - pg2-data:/home/postgres/pgdata
    networks:
      - patroni-net

  postgres3:
    image: ghcr.io/zalando/spilo-17:4.0-p2
    container_name: postgres3
    hostname: postgres3
    depends_on:
      - etcd
    ports:
      - "5435:5432"
      - "8010:8008"
    environment:
      SCOPE: nexo-cluster
      PGROOT: /home/postgres/pgdata
      PGDATA: /home/postgres/pgdata/pgroot/data
      PGPASSWORD_SUPERUSER: postgres
      ETCD_HOST: etcd:2379
      PATRONI_ETCD3_HOSTS: etcd:2379
      PATRONI_RESTAPI_LISTEN: 0.0.0.0:8008
      PATRONI_RESTAPI_CONNECT_ADDRESS: postgres3:8008
      PATRONI_NAME: postgres3
      PATRONI_REPLICATION_USERNAME: replicator
      PATRONI_REPLICATION_PASSWORD: replicator
      PATRONI_SUPERUSER_USERNAME: postgres
      PATRONI_SUPERUSER_PASSWORD: postgres
      PATRONI_POSTGRESQL_CONNECT_ADDRESS: postgres3:5432
    volumes:
      - pg3-data:/home/postgres/pgdata
    networks:
      - patroni-net

  haproxy:
    image: haproxy:3.1
    container_name: haproxy
    depends_on:
      - postgres1
      - postgres2
      - postgres3
    ports:
      - "5432:5432"
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    networks:
      - patroni-net

networks:
  patroni-net:
    driver: bridge

volumes:
  pg1-data:
  pg2-data:
  pg3-data:
